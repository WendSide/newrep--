<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | SOPHISTICATED MOTORS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div class="logo" >SOPHISTICATED MOTORS</div>
        <div class="menu">
            <a href="header.html" class="active">Каталог</a>
            <a href="love.html">Избранное</a>
            <a href="newreg.html">Войти</a>
            <a href="newcarpostv2.html">✚ Разместить объявление</a>
        </div>
    </div>

    <div class="main">
        <div class="left-menu"> 
            <!-- Поиск -->
            <div class="menu-title">ПОИСК</div>
            <div class="search-block">
                <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию...">
            </div>

            <!-- Фильтр по цене диапазон -->
            <div class="menu-title">ЦЕНА</div>
            <div class="price-range">
                <div class="price-inputs">
                    <input type="number" id="minPrice" placeholder="От" min="0" step="1000">
                    <span>-</span>
                    <input type="number" id="maxPrice" placeholder="До" min="0" step="1000">
                </div>
                <button id="applyPriceFilter" class="apply-price-btn">Применить</button>
            </div>

            <div class="menu-title">МАРКА</div> 
            <ul class="filter-list" data-filter="model"> 
                <li><a href="#" data-value="W220">VAZ</a></li> 
                <li><a href="#" data-value="W176">BMW</a></li> 
                <li><a href="#" data-value="G-класс 2013">Mercedes-Benz</a></li> 

            </ul>
        </div>
        <div class="cars" id="carsContainer"></div>
    </div>

    <div class="footer">
        <p>© 2026 Sophisticated Motors. Все права защищены.</p>
    </div>

    <script src="js/carpost.js"></script>
</body>
</html>
